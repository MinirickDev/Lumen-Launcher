name: Mirror to Lumen-Launcher

on:
  push:
    branches:
      - '**'
  delete:
    branches:
      - '**'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push mirror to Lumen-Launcher
        env:
          TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git remote add mirror "https://${TOKEN}@github.com/MinirickDev/Lumen-Launcher.git"
          git push mirror --force --all
          git push mirror --force --tags
